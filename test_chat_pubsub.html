<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebSocket Chat — Pub/Sub Test</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'JetBrains Mono', monospace;
    background: #0a0a0f;
    color: #e0e0e0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px;
    gap: 20px;
  }

  h1 {
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 4px;
    color: #555;
    font-weight: 400;
  }

  .subtitle {
    font-size: 11px;
    color: #333;
    letter-spacing: 1px;
  }

  .container {
    display: flex;
    gap: 20px;
    width: 100%;
    max-width: 1000px;
    flex: 1;
    min-height: 0;
  }

  .panel {
    flex: 1;
    border: 1px solid #1a1a2e;
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: #0d0d14;
  }

  .panel-header {
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #1a1a2e;
  }

  .panel-header span {
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #333;
    transition: background 0.3s;
  }
  .dot.online { background: #00ff88; box-shadow: 0 0 6px #00ff8866; }

  .config-row {
    padding: 8px 16px;
    display: flex;
    gap: 6px;
    border-bottom: 1px solid #1a1a2e;
    align-items: center;
    flex-wrap: wrap;
  }

  .config-row label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #555;
    min-width: 35px;
  }

  .config-row input {
    flex: 1;
    min-width: 50px;
    background: #0a0a0f;
    border: 1px solid #1a1a2e;
    padding: 6px 10px;
    color: #e0e0e0;
    font-family: inherit;
    font-size: 11px;
    border-radius: 4px;
    outline: none;
  }

  .config-row input.port-input {
    max-width: 60px;
    flex: 0;
  }

  .config-row input:focus { border-color: #333; }

  .btn-connect {
    background: transparent;
    border: 1px solid #1a1a2e;
    color: #555;
    padding: 6px 12px;
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
    flex-shrink: 0;
    width: 100%;
  }

  .btn-connect:hover { color: #00ff88; border-color: #00ff88; }
  .btn-connect.connected { color: #ff4444; border-color: #ff4444; }
  .btn-connect.connected:hover { color: #ff6666; border-color: #ff6666; }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    font-size: 13px;
    min-height: 0;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }

  .msg { line-height: 1.5; }
  .msg.system { color: #444; font-style: italic; }
  .msg .sender { color: #e8a86e; font-weight: 600; }
  .msg .text { color: #e0e0e0; }
  .msg .time { color: #333; font-size: 10px; margin-left: 8px; }

  .input-row {
    display: flex;
    border-top: 1px solid #1a1a2e;
  }

  input.msg-input {
    flex: 1;
    background: transparent;
    border: none;
    padding: 14px 16px;
    color: #e0e0e0;
    font-family: inherit;
    font-size: 13px;
    outline: none;
  }

  input.msg-input::placeholder { color: #333; }

  button.send-btn {
    background: transparent;
    border: none;
    border-left: 1px solid #1a1a2e;
    color: #444;
    padding: 14px 20px;
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: color 0.2s, background 0.2s;
  }

  button.send-btn:hover { color: #00ff88; background: #0a1a10; }
</style>
</head>
<body>

<h1>WebSocket Chat — Pub/Sub Test</h1>
<div class="subtitle">Each panel connects to a different Gateway to test Redis Pub/Sub</div>

<div class="container">
  <div class="panel">
    <div class="panel-header">
      <span>User 1 — Gateway :8080</span>
      <div class="dot" id="dot1"></div>
    </div>
    <div class="config-row">
      <label>Name</label>
      <input id="name1" value="Alice" />
      <label>Room</label>
      <input id="room1" value="general" />
      <label>Port</label>
      <input id="port1" value="8080" class="port-input" />
    </div>
    <div class="config-row">
      <button class="btn-connect" id="conn1" onclick="toggleConnect(1)">Connect</button>
    </div>
    <div class="messages" id="msg1"></div>
    <div class="input-row">
      <input class="msg-input" id="in1" placeholder="type a message..." />
      <button class="send-btn" onclick="send(1)">Send</button>
    </div>
  </div>

  <div class="panel">
    <div class="panel-header">
      <span>User 2 — Gateway :8081</span>
      <div class="dot" id="dot2"></div>
    </div>
    <div class="config-row">
      <label>Name</label>
      <input id="name2" value="Bob" />
      <label>Room</label>
      <input id="room2" value="general" />
      <label>Port</label>
      <input id="port2" value="8081" class="port-input" />
    </div>
    <div class="config-row">
      <button class="btn-connect" id="conn2" onclick="toggleConnect(2)">Connect</button>
    </div>
    <div class="messages" id="msg2"></div>
    <div class="input-row">
      <input class="msg-input" id="in2" placeholder="type a message..." />
      <button class="send-btn" onclick="send(2)">Send</button>
    </div>
  </div>
</div>

<script>
  const ws = {};

  function addMsg(panel, html, cls) {
    const el = document.getElementById('msg' + panel);
    const div = document.createElement('div');
    div.className = 'msg ' + cls;
    div.innerHTML = html;
    el.appendChild(div);
    el.scrollTop = el.scrollHeight;
  }

  function formatTime(t) {
    if (!t) return '';
    const d = new Date(t);
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }

  function toggleConnect(id) {
    if (ws[id] && ws[id].readyState === WebSocket.OPEN) {
      ws[id].close();
      return;
    }
    connect(id);
  }

  function connect(id) {
    const name = document.getElementById('name' + id).value.trim() || 'anon';
    const room = document.getElementById('room' + id).value.trim() || 'general';
    const port = document.getElementById('port' + id).value.trim() || '8080';
    const url = `ws://localhost:${port}/ws?name=${encodeURIComponent(name)}&room=${encodeURIComponent(room)}`;

    const sock = new WebSocket(url);
    ws[id] = sock;
    const btn = document.getElementById('conn' + id);

    sock.onopen = () => {
      document.getElementById('dot' + id).classList.add('online');
      btn.textContent = 'Disconnect';
      btn.classList.add('connected');
      addMsg(id, `connected to <b>${room}</b> as <b>${name}</b> via port <b>${port}</b>`, 'system');
    };

    sock.onmessage = (e) => {
      try {
        const data = JSON.parse(e.data);
        const time = `<span class="time">${formatTime(data.createdat)}</span>`;
        addMsg(id, `<span class="sender">${data.sender}:</span> <span class="text">${data.text}</span>${time}`, '');
      } catch {
        addMsg(id, e.data, '');
      }
    };

    sock.onclose = () => {
      document.getElementById('dot' + id).classList.remove('online');
      btn.textContent = 'Connect';
      btn.classList.remove('connected');
      addMsg(id, 'disconnected', 'system');
    };

    sock.onerror = () => {
      addMsg(id, 'connection error', 'system');
    };
  }

  function send(id) {
    const input = document.getElementById('in' + id);
    const msg = input.value.trim();
    if (!msg || !ws[id] || ws[id].readyState !== WebSocket.OPEN) return;
    ws[id].send(msg);
    input.value = '';
  }

  document.getElementById('in1').addEventListener('keydown', (e) => { if (e.key === 'Enter') send(1); });
  document.getElementById('in2').addEventListener('keydown', (e) => { if (e.key === 'Enter') send(2); });
</script>

</body>
</html>
