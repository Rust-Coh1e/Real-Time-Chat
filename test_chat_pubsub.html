<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebSocket Chat — Full</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'JetBrains Mono', monospace;
    background: #0a0a0f;
    color: #e0e0e0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px;
    gap: 20px;
  }

  h1 {
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 4px;
    color: #555;
    font-weight: 400;
  }

  .container {
    display: flex;
    gap: 20px;
    width: 100%;
    max-width: 1000px;
    flex: 1;
    min-height: 0;
  }

  .panel {
    flex: 1;
    border: 1px solid #1a1a2e;
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: #0d0d14;
  }

  .panel-header {
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #1a1a2e;
  }

  .panel-header span {
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #333;
    transition: background 0.3s;
  }
  .dot.online { background: #00ff88; box-shadow: 0 0 6px #00ff8866; }

  .config-row {
    padding: 8px 16px;
    display: flex;
    gap: 6px;
    border-bottom: 1px solid #1a1a2e;
    align-items: center;
    flex-wrap: wrap;
  }

  .config-row label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #555;
    min-width: 35px;
  }

  .config-row input {
    flex: 1;
    min-width: 50px;
    background: #0a0a0f;
    border: 1px solid #1a1a2e;
    padding: 6px 10px;
    color: #e0e0e0;
    font-family: inherit;
    font-size: 11px;
    border-radius: 4px;
    outline: none;
  }

  .config-row input.port-input {
    max-width: 60px;
    flex: 0;
  }

  .config-row input:focus { border-color: #333; }

  .btn {
    background: transparent;
    border: 1px solid #1a1a2e;
    color: #555;
    padding: 6px 12px;
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .btn:hover { color: #00ff88; border-color: #00ff88; }
  .btn.full { width: 100%; }
  .btn.connected { color: #ff4444; border-color: #ff4444; }
  .btn.connected:hover { color: #ff6666; border-color: #ff6666; }
  .btn.auth-btn { color: #6ec1e4; border-color: #6ec1e4; }
  .btn.auth-btn:hover { color: #9ed4ee; border-color: #9ed4ee; }

  .status-msg {
    padding: 4px 16px;
    font-size: 10px;
    border-bottom: 1px solid #1a1a2e;
  }
  .status-msg.ok { color: #00ff88; }
  .status-msg.err { color: #ff4444; }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    font-size: 13px;
    min-height: 0;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }

  .msg { line-height: 1.5; }
  .msg.system { color: #444; font-style: italic; }
  .msg .sender { color: #e8a86e; font-weight: 600; }
  .msg .text { color: #e0e0e0; }
  .msg .time { color: #333; font-size: 10px; margin-left: 8px; }
  .msg .file-link { color: #6ec1e4; text-decoration: none; font-size: 11px; }
  .msg .file-link:hover { text-decoration: underline; }
  .msg img.preview {
    max-width: 200px;
    max-height: 150px;
    border-radius: 4px;
    margin-top: 4px;
    display: block;
    border: 1px solid #1a1a2e;
  }

  .input-row {
    display: flex;
    border-top: 1px solid #1a1a2e;
    align-items: center;
  }

  input.msg-input {
    flex: 1;
    background: transparent;
    border: none;
    padding: 14px 16px;
    color: #e0e0e0;
    font-family: inherit;
    font-size: 13px;
    outline: none;
  }

  input.msg-input::placeholder { color: #333; }

  .file-input-label {
    padding: 10px 12px;
    cursor: pointer;
    color: #444;
    font-size: 16px;
    transition: color 0.2s;
    border-left: 1px solid #1a1a2e;
  }
  .file-input-label:hover { color: #6ec1e4; }

  input.file-hidden { display: none; }

  button.send-btn {
    background: transparent;
    border: none;
    border-left: 1px solid #1a1a2e;
    color: #444;
    padding: 14px 20px;
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: color 0.2s, background 0.2s;
  }

  button.send-btn:hover { color: #00ff88; background: #0a1a10; }

  .upload-preview {
    padding: 6px 16px;
    font-size: 10px;
    color: #6ec1e4;
    border-top: 1px solid #1a1a2e;
    display: none;
    align-items: center;
    gap: 8px;
  }
  .upload-preview .remove {
    color: #ff4444;
    cursor: pointer;
    font-size: 12px;
  }
</style>
</head>
<body>

<h1>WebSocket Chat — Full Featured</h1>

<div class="container">
  <div class="panel">
    <div class="panel-header">
      <span>User 1</span>
      <div class="dot" id="dot1"></div>
    </div>
    <div class="config-row">
      <label>User</label>
      <input id="user1" value="alice" />
      <label>Pass</label>
      <input id="pass1" value="secret123" type="password" />
    </div>
    <div class="config-row">
      <button class="btn auth-btn" onclick="register(1)">Register</button>
      <button class="btn auth-btn" onclick="login(1)">Login</button>
    </div>
    <div id="status1" class="status-msg" style="display:none"></div>
    <div class="config-row">
      <label>Room</label>
      <input id="room1" value="general" />
      <label>GW</label>
      <input id="port1" value="8080" class="port-input" />
      <label>Auth</label>
      <input id="auth1" value="8082" class="port-input" />
      <label>File</label>
      <input id="file_port1" value="8083" class="port-input" />
    </div>
    <div class="config-row">
      <button class="btn full" id="conn1" onclick="toggleConnect(1)">Connect</button>
    </div>
    <div class="messages" id="msg1"></div>
    <div class="upload-preview" id="preview1">
      <span id="preview_name1"></span>
      <span class="remove" onclick="clearFile(1)">x</span>
    </div>
    <div class="input-row">
      <input class="msg-input" id="in1" placeholder="type a message..." />
      <label class="file-input-label" for="filein1" title="Attach file">&#x1F4CE;</label>
      <input type="file" class="file-hidden" id="filein1" onchange="fileSelected(1)" />
      <button class="send-btn" onclick="send(1)">Send</button>
    </div>
  </div>

  <div class="panel">
    <div class="panel-header">
      <span>User 2</span>
      <div class="dot" id="dot2"></div>
    </div>
    <div class="config-row">
      <label>User</label>
      <input id="user2" value="bob" />
      <label>Pass</label>
      <input id="pass2" value="secret456" type="password" />
    </div>
    <div class="config-row">
      <button class="btn auth-btn" onclick="register(2)">Register</button>
      <button class="btn auth-btn" onclick="login(2)">Login</button>
    </div>
    <div id="status2" class="status-msg" style="display:none"></div>
    <div class="config-row">
      <label>Room</label>
      <input id="room2" value="general" />
      <label>GW</label>
      <input id="port2" value="8081" class="port-input" />
      <label>Auth</label>
      <input id="auth2" value="8082" class="port-input" />
      <label>File</label>
      <input id="file_port2" value="8083" class="port-input" />
    </div>
    <div class="config-row">
      <button class="btn full" id="conn2" onclick="toggleConnect(2)">Connect</button>
    </div>
    <div class="messages" id="msg2"></div>
    <div class="upload-preview" id="preview2">
      <span id="preview_name2"></span>
      <span class="remove" onclick="clearFile(2)">x</span>
    </div>
    <div class="input-row">
      <input class="msg-input" id="in2" placeholder="type a message..." />
      <label class="file-input-label" for="filein2" title="Attach file">&#x1F4CE;</label>
      <input type="file" class="file-hidden" id="filein2" onchange="fileSelected(2)" />
      <button class="send-btn" onclick="send(2)">Send</button>
    </div>
  </div>
</div>

<script>
  const wsConn = {};
  const tokens = {};
  const pendingFiles = {};

  function showStatus(id, text, ok) {
    const el = document.getElementById('status' + id);
    el.textContent = text;
    el.className = 'status-msg ' + (ok ? 'ok' : 'err');
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 4000);
  }

  async function authRequest(id, endpoint) {
    const user = document.getElementById('user' + id).value.trim();
    const pass = document.getElementById('pass' + id).value.trim();
    const authPort = document.getElementById('auth' + id).value.trim();
    try {
      const res = await fetch(`http://localhost:${authPort}/${endpoint}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: user, password: pass })
      });
      const data = await res.json();
      if (!res.ok) { showStatus(id, `${endpoint} failed: ${data.error || res.status}`, false); return null; }
      return data;
    } catch (e) { showStatus(id, `${endpoint} error: ${e.message}`, false); return null; }
  }

  async function register(id) {
    const data = await authRequest(id, 'register');
    if (data) showStatus(id, `registered`, true);
  }

  async function login(id) {
    const data = await authRequest(id, 'login');
    if (data && data.token) { tokens[id] = data.token; showStatus(id, 'logged in', true); }
  }

  function isImage(url) {
    return /\.(jpg|jpeg|png|gif|webp|svg|bmp)$/i.test(url);
  }

  function renderFileContent(url) {
    if (!url) return '';
    const fname = url.split('/').pop();
    if (isImage(url)) {
      return `<br><a href="${url}" target="_blank"><img class="preview" src="${url}" alt="${fname}"></a>`;
    }
    return `<br><a class="file-link" href="${url}" target="_blank">&#x1F4CE; ${fname}</a>`;
  }

  function addMsg(panel, html, cls) {
    const el = document.getElementById('msg' + panel);
    const div = document.createElement('div');
    div.className = 'msg ' + cls;
    div.innerHTML = html;
    el.appendChild(div);
    el.scrollTop = el.scrollHeight;
  }

  function formatTime(t) {
    if (!t) return '';
    let d;
    if (typeof t === 'number') { d = new Date(t * 1000); }
    else { d = new Date(t); }
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }

  function toggleConnect(id) {
    if (wsConn[id] && wsConn[id].readyState === WebSocket.OPEN) { wsConn[id].close(); return; }
    connect(id);
  }

  function connect(id) {
    const token = tokens[id];
    if (!token) { showStatus(id, 'login first', false); return; }
    const room = document.getElementById('room' + id).value.trim() || 'general';
    const port = document.getElementById('port' + id).value.trim() || '8080';
    const url = `ws://localhost:${port}/ws?token=${encodeURIComponent(token)}&room=${encodeURIComponent(room)}`;
    const sock = new WebSocket(url);
    wsConn[id] = sock;
    const btn = document.getElementById('conn' + id);

    sock.onopen = () => {
      document.getElementById('dot' + id).classList.add('online');
      btn.textContent = 'Disconnect'; btn.classList.add('connected');
      addMsg(id, `connected to <b>${room}</b>`, 'system');
    };

    sock.onmessage = (e) => {
      try {
        const data = JSON.parse(e.data);
        const time = `<span class="time">${formatTime(data.timestamp || data.createdat)}</span>`;
        const file = renderFileContent(data.file_url || data.fileUrl || data.FileUrl);
        const text = data.text ? `<span class="text">${data.text}</span>` : '';
        addMsg(id, `<span class="sender">${data.sender}:</span> ${text}${time}${file}`, '');
      } catch { addMsg(id, e.data, ''); }
    };

    sock.onclose = () => {
      document.getElementById('dot' + id).classList.remove('online');
      btn.textContent = 'Connect'; btn.classList.remove('connected');
      addMsg(id, 'disconnected', 'system');
    };

    sock.onerror = () => { addMsg(id, 'connection error', 'system'); };
  }

  function fileSelected(id) {
    const input = document.getElementById('filein' + id);
    if (input.files.length > 0) {
      pendingFiles[id] = input.files[0];
      document.getElementById('preview_name' + id).textContent = input.files[0].name;
      document.getElementById('preview' + id).style.display = 'flex';
    }
  }

  function clearFile(id) {
    delete pendingFiles[id];
    document.getElementById('filein' + id).value = '';
    document.getElementById('preview' + id).style.display = 'none';
  }

  async function uploadFile(id, file) {
    const filePort = document.getElementById('file_port' + id).value.trim() || '8083';
    const formData = new FormData();
    formData.append('myFile', file);
    try {
      const res = await fetch(`http://localhost:${filePort}/upload`, {
        method: 'POST',
        body: formData
      });
      const data = await res.json();
      if (data.url) return data.url;
      showStatus(id, 'upload failed', false);
      return null;
    } catch (e) { showStatus(id, 'upload error: ' + e.message, false); return null; }
  }

  async function send(id) {
    const input = document.getElementById('in' + id);
    const text = input.value.trim();
    const file = pendingFiles[id];

    if (!text && !file) return;
    if (!wsConn[id] || wsConn[id].readyState !== WebSocket.OPEN) return;

    let fileUrl = '';
    if (file) {
      showStatus(id, 'uploading...', true);
      fileUrl = await uploadFile(id, file);
      if (!fileUrl) return;
      clearFile(id);
    }

    const msg = {};
    if (text) msg.text = text;
    if (fileUrl) msg.file_url = fileUrl;

    wsConn[id].send(JSON.stringify(msg));
    input.value = '';
  }

  document.getElementById('in1').addEventListener('keydown', (e) => { if (e.key === 'Enter') send(1); });
  document.getElementById('in2').addEventListener('keydown', (e) => { if (e.key === 'Enter') send(2); });
</script>

</body>
</html>
