<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebSocket Chat — Full</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'JetBrains Mono', monospace;
    background: #0a0a0f; color: #e0e0e0;
    height: 100vh; display: flex; flex-direction: column; align-items: center;
    padding: 24px; gap: 16px;
  }
  h1 { font-size: 13px; text-transform: uppercase; letter-spacing: 4px; color: #555; font-weight: 400; }
  .container { display: flex; gap: 20px; width: 100%; max-width: 1100px; flex: 1; min-height: 0; }
  .panel {
    flex: 1; border: 1px solid #1a1a2e; border-radius: 8px;
    display: flex; flex-direction: column; overflow: hidden; background: #0d0d14;
  }
  .panel-header {
    padding: 10px 16px; display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid #1a1a2e;
  }
  .panel-header span { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #333; transition: background 0.3s; }
  .dot.online { background: #00ff88; box-shadow: 0 0 6px #00ff8866; }
  .config-row {
    padding: 6px 14px; display: flex; gap: 5px; border-bottom: 1px solid #1a1a2e;
    align-items: center; flex-wrap: wrap;
  }
  .config-row label { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: #555; min-width: 30px; }
  .config-row input {
    flex: 1; min-width: 40px; background: #0a0a0f; border: 1px solid #1a1a2e;
    padding: 5px 8px; color: #e0e0e0; font-family: inherit; font-size: 10px; border-radius: 4px; outline: none;
  }
  .config-row input.port-input { max-width: 50px; flex: 0; }
  .btn {
    background: transparent; border: 1px solid #1a1a2e; color: #555;
    padding: 5px 10px; font-family: inherit; font-size: 9px; letter-spacing: 1px;
    text-transform: uppercase; cursor: pointer; border-radius: 4px; transition: all 0.2s; flex-shrink: 0;
  }
  .btn:hover { color: #00ff88; border-color: #00ff88; }
  .btn.full { width: 100%; }
  .btn.connected { color: #ff4444; border-color: #ff4444; }
  .btn.auth-btn { color: #6ec1e4; border-color: #6ec1e4; }
  .status-msg { padding: 3px 14px; font-size: 9px; border-bottom: 1px solid #1a1a2e; }
  .status-msg.ok { color: #00ff88; }
  .status-msg.err { color: #ff4444; }

  .messages { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 4px; font-size: 12px; min-height: 0; }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }

  .msg { line-height: 1.5; padding: 4px 8px; border-radius: 4px; position: relative; }
  .msg:hover { background: #111122; }
  .msg.system { color: #444; font-style: italic; }
  .msg.deleted { color: #555; font-style: italic; text-decoration: line-through; }
  .msg .sender { color: #e8a86e; font-weight: 600; }
  .msg .text { color: #e0e0e0; }
  .msg .time { color: #333; font-size: 9px; margin-left: 6px; }
  .msg .edited-tag { color: #555; font-size: 9px; margin-left: 4px; }
  .msg .file-link { color: #6ec1e4; text-decoration: none; font-size: 10px; }
  .msg img.preview { max-width: 180px; max-height: 120px; border-radius: 4px; margin-top: 4px; display: block; border: 1px solid #1a1a2e; }

  .msg-actions {
    display: none; position: absolute; right: 8px; top: 2px;
    gap: 4px; align-items: center;
  }
  .msg:hover .msg-actions { display: flex; }
  .msg-actions button {
    background: #1a1a2e; border: none; color: #888; font-size: 11px;
    cursor: pointer; padding: 2px 5px; border-radius: 3px; font-family: inherit;
  }
  .msg-actions button:hover { color: #e0e0e0; background: #2a2a4e; }

  .reactions { display: flex; gap: 4px; margin-top: 2px; flex-wrap: wrap; }
  .reaction-badge {
    background: #1a1a2e; border: 1px solid #2a2a4e; border-radius: 10px;
    padding: 1px 6px; font-size: 11px; cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; gap: 3px;
  }
  .reaction-badge:hover { border-color: #6ec1e4; }
  .reaction-badge .count { font-size: 9px; color: #888; }

  .emoji-picker {
    display: none; position: absolute; right: 0; top: -30px;
    background: #1a1a2e; border: 1px solid #2a2a4e; border-radius: 6px;
    padding: 4px; gap: 2px; z-index: 10; flex-wrap: wrap; width: 160px;
  }
  .emoji-picker.show { display: flex; }
  .emoji-picker span { cursor: pointer; font-size: 16px; padding: 2px 4px; border-radius: 3px; }
  .emoji-picker span:hover { background: #2a2a4e; }

  .input-row { display: flex; border-top: 1px solid #1a1a2e; align-items: center; }
  input.msg-input {
    flex: 1; background: transparent; border: none; padding: 12px 14px;
    color: #e0e0e0; font-family: inherit; font-size: 12px; outline: none;
  }
  input.msg-input::placeholder { color: #333; }
  .file-input-label {
    padding: 8px 10px; cursor: pointer; color: #444; font-size: 14px;
    transition: color 0.2s; border-left: 1px solid #1a1a2e;
  }
  .file-input-label:hover { color: #6ec1e4; }
  input.file-hidden { display: none; }
  button.send-btn {
    background: transparent; border: none; border-left: 1px solid #1a1a2e;
    color: #444; padding: 12px 16px; font-family: inherit; font-size: 11px;
    letter-spacing: 1px; text-transform: uppercase; cursor: pointer;
  }
  button.send-btn:hover { color: #00ff88; background: #0a1a10; }
  .upload-preview {
    padding: 4px 14px; font-size: 9px; color: #6ec1e4;
    border-top: 1px solid #1a1a2e; display: none; align-items: center; gap: 6px;
  }
  .upload-preview .remove { color: #ff4444; cursor: pointer; font-size: 11px; }
</style>
</head>
<body>
<h1>WebSocket Chat — Reactions & Edit</h1>
<div class="container" id="panels"></div>

<script>
const EMOJIS = ['👍','❤️','😂','😮','😢','🔥','👏','🎉'];
const wsConn = {}, tokens = {}, pendingFiles = {}, msgStore = {};

function createPanel(id, defaults) {
  return `
  <div class="panel">
    <div class="panel-header"><span>User ${id}</span><div class="dot" id="dot${id}"></div></div>
    <div class="config-row">
      <label>User</label><input id="user${id}" value="${defaults.user}" />
      <label>Pass</label><input id="pass${id}" value="${defaults.pass}" type="password" />
    </div>
    <div class="config-row">
      <button class="btn auth-btn" onclick="register(${id})">Register</button>
      <button class="btn auth-btn" onclick="login(${id})">Login</button>
    </div>
    <div id="status${id}" class="status-msg" style="display:none"></div>
    <div class="config-row">
      <label>Room</label><input id="room${id}" value="general" />
      <label>GW</label><input id="port${id}" value="${defaults.gw}" class="port-input" />
      <label>Auth</label><input id="auth${id}" value="8082" class="port-input" />
      <label>File</label><input id="file_port${id}" value="8083" class="port-input" />
    </div>
    <div class="config-row"><button class="btn full" id="conn${id}" onclick="toggleConnect(${id})">Connect</button></div>
    <div class="messages" id="msg${id}"></div>
    <div class="upload-preview" id="preview${id}"><span id="preview_name${id}"></span><span class="remove" onclick="clearFile(${id})">x</span></div>
    <div class="input-row">
      <input class="msg-input" id="in${id}" placeholder="type a message..." onkeydown="if(event.key==='Enter')send(${id})" />
      <label class="file-input-label" for="filein${id}">&#x1F4CE;</label>
      <input type="file" class="file-hidden" id="filein${id}" onchange="fileSelected(${id})" />
      <button class="send-btn" onclick="send(${id})">Send</button>
    </div>
  </div>`;
}

document.getElementById('panels').innerHTML =
  createPanel(1, {user:'alice',pass:'secret123',gw:'8080'}) +
  createPanel(2, {user:'bob',pass:'secret456',gw:'8081'});

function showStatus(id,t,ok){const e=document.getElementById('status'+id);e.textContent=t;e.className='status-msg '+(ok?'ok':'err');e.style.display='block';setTimeout(()=>e.style.display='none',4000);}

async function authRequest(id,ep){
  const u=document.getElementById('user'+id).value.trim(),p=document.getElementById('pass'+id).value.trim(),port=document.getElementById('auth'+id).value.trim();
  try{const r=await fetch(`http://localhost:${port}/${ep}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});const d=await r.json();if(!r.ok){showStatus(id,`${ep} failed`,false);return null;}return d;}catch(e){showStatus(id,e.message,false);return null;}
}
async function register(id){const d=await authRequest(id,'register');if(d)showStatus(id,'registered',true);}
async function login(id){const d=await authRequest(id,'login');if(d&&d.token){tokens[id]=d.token;showStatus(id,'logged in',true);}}

function isImage(u){return/\.(jpg|jpeg|png|gif|webp|svg|bmp)$/i.test(u);}
function renderFile(u){if(!u)return'';const f=u.split('/').pop();return isImage(u)?`<br><a href="${u}" target="_blank"><img class="preview" src="${u}"></a>`:`<br><a class="file-link" href="${u}" target="_blank">&#x1F4CE; ${f}</a>`;}
function fmtTime(t){if(!t)return'';const d=new Date(typeof t==='number'?t*1000:t);return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});}

function renderReactions(panelId, msgId) {
  const msgs = msgStore[panelId] || {};
  const m = msgs[msgId];
  if (!m || !m.reactions) return '';
  const counts = {};
  m.reactions.forEach(r => { counts[r.emoji] = (counts[r.emoji]||0)+1; });
  return '<div class="reactions">' +
    Object.entries(counts).map(([emoji,count]) =>
      `<span class="reaction-badge" onclick="react(${panelId},'${msgId}','${emoji}')">${emoji}<span class="count">${count}</span></span>`
    ).join('') + '</div>';
}

function renderMsg(panelId, data) {
  const msgId = data.message_id || data.messageId || data.MessageId || '';
  const time = `<span class="time">${fmtTime(data.timestamp||data.createdat)}</span>`;
  const file = renderFile(data.file_url||data.fileUrl||data.FileUrl||'');
  const text = data.text ? `<span class="text">${data.text}</span>` : '';
  const actions = msgId ? `
    <div class="msg-actions">
      <button onclick="showEmojis(this,${panelId},'${msgId}')">😀</button>
      <button onclick="startEdit(${panelId},'${msgId}')">✏️</button>
      <button onclick="deleteMsg(${panelId},'${msgId}')">🗑️</button>
      <div class="emoji-picker" id="ep_${panelId}_${msgId}">
        ${EMOJIS.map(e=>`<span onclick="react(${panelId},'${msgId}','${e}')">${e}</span>`).join('')}
      </div>
    </div>` : '';
  const reactions = renderReactions(panelId, msgId);
  return `<span class="sender">${data.sender}:</span> ${text}${time}${file}${actions}${reactions}`;
}

function addMsg(panel, html, cls, msgId) {
  const el = document.getElementById('msg'+panel);
  const div = document.createElement('div');
  div.className = 'msg ' + cls;
  div.innerHTML = html;
  if (msgId) div.id = `m_${panel}_${msgId}`;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

function storeMsg(panelId, data) {
  const msgId = data.message_id || data.messageId || '';
  if (!msgId) return;
  if (!msgStore[panelId]) msgStore[panelId] = {};
  if (!msgStore[panelId][msgId]) msgStore[panelId][msgId] = { ...data, reactions: [] };
}

function handleIncoming(panelId, data) {
  const action = data.action || data.Action || '';
  const msgId = data.message_id || data.messageId || data.MessageId || '';

  switch(action) {
    case 'edit': {
      const el = document.getElementById(`m_${panelId}_${msgId}`);
      if (el) {
        if (msgStore[panelId] && msgStore[panelId][msgId]) msgStore[panelId][msgId].text = data.text;
        el.innerHTML = renderMsg(panelId, {...(msgStore[panelId]||{})[msgId]||data, text: data.text}) + '<span class="edited-tag">(edited)</span>';
      }
      break;
    }
    case 'delete': {
      const el = document.getElementById(`m_${panelId}_${msgId}`);
      if (el) { el.className = 'msg deleted'; el.innerHTML = `<span class="sender">${data.sender}:</span> message deleted`; }
      break;
    }
    case 'react': {
      if (!msgStore[panelId]) msgStore[panelId] = {};
      if (!msgStore[panelId][msgId]) msgStore[panelId][msgId] = { ...data, reactions: [] };
      const m = msgStore[panelId][msgId];
      const idx = m.reactions.findIndex(r => r.emoji === data.emoji && r.sender === data.sender);
      if (idx >= 0) m.reactions.splice(idx, 1); else m.reactions.push({emoji: data.emoji, sender: data.sender});
      const el = document.getElementById(`m_${panelId}_${msgId}`);
      if (el) {
        const reactDiv = el.querySelector('.reactions');
        const newReact = renderReactions(panelId, msgId);
        if (reactDiv) reactDiv.outerHTML = newReact;
        else el.insertAdjacentHTML('beforeend', newReact);
      }
      break;
    }
    default: {
      storeMsg(panelId, data);
      addMsg(panelId, renderMsg(panelId, data), '', msgId);
    }
  }
}

function showEmojis(btn, panelId, msgId) {
  const picker = document.getElementById(`ep_${panelId}_${msgId}`);
  picker.classList.toggle('show');
  setTimeout(() => document.addEventListener('click', function close(e) {
    if (!picker.contains(e.target)) { picker.classList.remove('show'); document.removeEventListener('click', close); }
  }), 0);
}

function react(panelId, msgId, emoji) {
  const s = wsConn[panelId]; if (!s || s.readyState !== WebSocket.OPEN) return;
  s.send(JSON.stringify({ action: 'react', message_id: msgId, emoji }));
  const picker = document.getElementById(`ep_${panelId}_${msgId}`);
  if (picker) picker.classList.remove('show');
}

function startEdit(panelId, msgId) {
  const m = (msgStore[panelId]||{})[msgId];
  const input = document.getElementById('in'+panelId);
  input.value = m ? m.text : '';
  input.dataset.editId = msgId;
  input.placeholder = 'editing... (Enter to save, Esc to cancel)';
  input.addEventListener('keydown', function esc(e) {
    if (e.key === 'Escape') { input.value=''; delete input.dataset.editId; input.placeholder='type a message...'; input.removeEventListener('keydown',esc); }
  });
}

function deleteMsg(panelId, msgId) {
  const s = wsConn[panelId]; if (!s || s.readyState !== WebSocket.OPEN) return;
  s.send(JSON.stringify({ action: 'delete', message_id: msgId }));
}

function toggleConnect(id) {
  if (wsConn[id] && wsConn[id].readyState === WebSocket.OPEN) { wsConn[id].close(); return; }
  connect(id);
}

function connect(id) {
  const token = tokens[id]; if (!token) { showStatus(id,'login first',false); return; }
  const room = document.getElementById('room'+id).value.trim()||'general';
  const port = document.getElementById('port'+id).value.trim()||'8080';
  const sock = new WebSocket(`ws://localhost:${port}/ws?token=${encodeURIComponent(token)}&room=${encodeURIComponent(room)}`);
  wsConn[id] = sock;
  const btn = document.getElementById('conn'+id);
  sock.onopen = () => { document.getElementById('dot'+id).classList.add('online'); btn.textContent='Disconnect'; btn.classList.add('connected'); addMsg(id,`connected to <b>${room}</b>`,'system'); };
  sock.onmessage = (e) => { try { handleIncoming(id, JSON.parse(e.data)); } catch { addMsg(id, e.data, ''); } };
  sock.onclose = () => { document.getElementById('dot'+id).classList.remove('online'); btn.textContent='Connect'; btn.classList.remove('connected'); addMsg(id,'disconnected','system'); };
  sock.onerror = () => { addMsg(id,'connection error','system'); };
}

function fileSelected(id) {
  const input = document.getElementById('filein'+id);
  if (input.files.length > 0) { pendingFiles[id]=input.files[0]; document.getElementById('preview_name'+id).textContent=input.files[0].name; document.getElementById('preview'+id).style.display='flex'; }
}
function clearFile(id) { delete pendingFiles[id]; document.getElementById('filein'+id).value=''; document.getElementById('preview'+id).style.display='none'; }

async function uploadFile(id, file) {
  const fp = document.getElementById('file_port'+id).value.trim()||'8083';
  const fd = new FormData(); fd.append('myFile', file);
  try { const r = await fetch(`http://localhost:${fp}/upload`,{method:'POST',body:fd}); const d=await r.json(); return d.url||null; } catch(e) { showStatus(id,'upload error',false); return null; }
}

async function send(id) {
  const input = document.getElementById('in'+id);
  const text = input.value.trim();
  const file = pendingFiles[id];
  const editId = input.dataset.editId;
  if (!text && !file && !editId) return;
  if (!wsConn[id] || wsConn[id].readyState !== WebSocket.OPEN) return;

  if (editId) {
    wsConn[id].send(JSON.stringify({ action: 'edit', message_id: editId, text }));
    input.value = ''; delete input.dataset.editId; input.placeholder = 'type a message...';
    return;
  }

  let fileUrl = '';
  if (file) { showStatus(id,'uploading...',true); fileUrl = await uploadFile(id, file); if (!fileUrl) return; clearFile(id); }
  const msg = {}; if (text) msg.text = text; if (fileUrl) msg.file_url = fileUrl;
  wsConn[id].send(JSON.stringify(msg));
  input.value = '';
}
</script>
</body>
</html>
