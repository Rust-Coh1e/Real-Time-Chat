syntax = "proto3";

option go_package = "./proto";

message ChatMessage {
    string sender = 1;
    string text = 2;
    string room = 3;
    int64 timestamp = 4;
    string sender_id = 5;
    string file_url = 6;
    string action = 7;      
    string message_id = 8;  
    string emoji = 9; 
}

service ChatService {
  rpc Chat(stream ChatMessage) returns (stream ChatMessage);
}